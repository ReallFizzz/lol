<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReallFizzz — Links</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --card: #161922;
    --card2: #1e2230;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f8;
    --muted: #7b8099;
    --accent: #6c8cff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 20px 80px;
  }

  .stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0;
    background-image:
      radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 70% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 25% 90%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 40%, rgba(108,140,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 35%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 63% 85%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 33% 10%, rgba(255,255,255,0.25) 0%, transparent 100%);
  }

  .page { position: relative; z-index: 1; width: 100%; max-width: 480px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeUp 0.6s ease both;
  }

  .avatar-ring {
    width: 96px; height: 96px;
    border-radius: 50%;
    margin: 0 auto 20px;
    padding: 3px;
    background: linear-gradient(135deg, #6c8cff 0%, #a78bfa 50%, #38bdf8 100%);
    animation: spin-ring 8s linear infinite;
  }

  @keyframes spin-ring {
    0% { background: linear-gradient(0deg, #6c8cff 0%, #a78bfa 50%, #38bdf8 100%); }
    25% { background: linear-gradient(90deg, #6c8cff 0%, #a78bfa 50%, #38bdf8 100%); }
    50% { background: linear-gradient(180deg, #6c8cff 0%, #a78bfa 50%, #38bdf8 100%); }
    75% { background: linear-gradient(270deg, #6c8cff 0%, #a78bfa 50%, #38bdf8 100%); }
    100% { background: linear-gradient(360deg, #6c8cff 0%, #a78bfa 50%, #38bdf8 100%); }
  }

  .avatar-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: var(--card2);
    display: flex; align-items: center; justify-content: center;
  }

  .avatar-inner img { width: 100%; height: 100%; object-fit: cover; }

  .avatar-fallback {
    font-family: 'Syne', sans-serif;
    font-size: 32px; font-weight: 800;
    color: #a78bfa;
  }

  .username {
    font-family: 'Syne', sans-serif;
    font-size: 28px; font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    background: linear-gradient(90deg, #e0e8ff, #a78bfa, #38bdf8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .tagline {
    font-size: 14px; color: var(--muted); font-weight: 300; letter-spacing: 0.5px;
  }

  .divider {
    width: 40px; height: 2px;
    background: linear-gradient(90deg, #6c8cff, #a78bfa);
    border-radius: 2px;
    margin: 16px auto 0;
  }

  /* Cards */
  .links { display: flex; flex-direction: column; gap: 12px; }

  .link-card {
    display: flex; align-items: center; gap: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 18px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    animation: fadeUp 0.6s ease both;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .link-card::before {
    content: '';
    position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    border-radius: 16px 0 0 16px;
    background: var(--accent-color, #6c8cff);
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .link-card:hover {
    transform: translateY(-2px) translateX(2px);
    border-color: var(--border2);
    background: var(--card2);
  }

  .link-card:hover::before { opacity: 1; }

  .icon-wrap {
    width: 48px; height: 48px; border-radius: 12px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--icon-bg, rgba(108,140,255,0.12));
  }

  .icon-wrap svg { width: 24px; height: 24px; }

  .card-text { flex: 1; }
  .card-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 2px; }
  .card-handle { font-size: 12px; color: var(--muted); }

  .arrow {
    width: 32px; height: 32px; border-radius: 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; color: var(--muted);
    transition: color 0.2s, background 0.2s;
  }
  .link-card:hover .arrow { color: var(--text); background: rgba(255,255,255,0.08); }

  /* TON card special */
  .ton-card { cursor: default; }
  .ton-address {
    font-family: monospace; font-size: 11px;
    color: var(--muted); margin-top: 4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 220px;
  }
  .copy-btn {
    background: rgba(255,255,255,0.06); border: 1px solid var(--border);
    color: var(--muted); border-radius: 8px;
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    padding: 6px 12px; cursor: pointer;
    transition: background 0.2s, color 0.2s;
    white-space: nowrap; flex-shrink: 0;
  }
  .copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .copy-btn.copied { color: #4ade80; border-color: rgba(74,222,128,0.3); }

  /* Mc avatar */
  .mc-avatar {
    width: 48px; height: 48px; border-radius: 12px;
    overflow: hidden; flex-shrink: 0;
    background: rgba(74,222,128,0.1);
    image-rendering: pixelated;
    display: flex; align-items: center; justify-content: center;
  }
  .mc-avatar img { width: 100%; height: 100%; object-fit: cover; image-rendering: pixelated; }

  /* Footer */
  .footer { text-align: center; margin-top: 48px; font-size: 12px; color: #3d4259; animation: fadeUp 0.6s 0.8s ease both; opacity: 0; animation-fill-mode: both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .link-card:nth-child(1) { animation-delay: 0.1s; }
  .link-card:nth-child(2) { animation-delay: 0.18s; }
  .link-card:nth-child(3) { animation-delay: 0.26s; }
  .link-card:nth-child(4) { animation-delay: 0.34s; }
  .link-card:nth-child(5) { animation-delay: 0.42s; }
  .link-card:nth-child(6) { animation-delay: 0.5s; }

  .badge {
    font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
    padding: 2px 8px; border-radius: 20px;
    background: rgba(108,140,255,0.15); color: #8aabff;
    margin-left: 8px;
  }
</style>

<script>
function copyTon(e) {
  e.preventDefault();
  const addr = 'UQC2iY10Z2sMql8Loq-eawlRAIFxswAQ7DZASPIqPbphzPTh';
  navigator.clipboard.writeText(addr).then(() => {

    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Копировать';
      btn.classList.remove('copied');
    }, 2000);
  });
}
